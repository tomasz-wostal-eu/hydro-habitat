name: Branch Protection Checks

on:
  push:
    branches: [ main, develop ]
  # Note: PR checks are handled by pr-check.yaml

jobs:
  lint-and-test:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Run backend linting
      run: |
        docker compose run --rm backend-lint

    - name: Run frontend linting
      run: |
        docker compose run --rm frontend-lint

    - name: Run backend unit tests
      run: |
        docker compose run --rm backend-unit-test

    - name: Run frontend tests
      run: |
        docker compose run --rm frontend-test

    - name: Run backend integration tests
      run: |
        docker compose run --rm backend-integration-test

    - name: Run backend security scanning
      run: |
        docker compose run --rm backend-security

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend
      run: |
        docker compose build backend

    - name: Build frontend
      run: |
        docker compose build frontend

    - name: Verify application startup
      run: |
        docker compose up -d
        sleep 30
        
        # Check backend health
        curl -f http://localhost:8080/health || exit 1
        
        # Check frontend availability
        curl -f http://localhost:3000 || exit 1
        
        docker compose down