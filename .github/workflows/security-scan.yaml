name: Security Scan

on:
  push:
    branches: [ "main", "dev", "develop" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write  # Required for uploading SARIF results
  actions: read          # Required for private repos
  id-token: write        # Required for OIDC token

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner on backend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './backend'
        format: 'sarif'
        output: 'trivy-backend-results.sarif'
        exit-code: '0'  # Don't fail the job on vulnerabilities
        severity: 'CRITICAL,HIGH,MEDIUM'
        scanners: 'vuln,secret'  # Scan for vulnerabilities and secrets

    - name: Run Trivy vulnerability scanner on frontend
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: './frontend'
        format: 'sarif'
        output: 'trivy-frontend-results.sarif'
        exit-code: '0'  # Don't fail the job on vulnerabilities
        severity: 'CRITICAL,HIGH,MEDIUM'
        scanners: 'vuln,secret'  # Scan for vulnerabilities and secrets

    - name: Upload backend Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()  # Upload results even if scan found vulnerabilities
      with:
        sarif_file: 'trivy-backend-results.sarif'
        category: 'trivy-backend'

    - name: Upload frontend Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()  # Upload results even if scan found vulnerabilities
      with:
        sarif_file: 'trivy-frontend-results.sarif'
        category: 'trivy-frontend'

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        load: true
        tags: hydro-backend:scan
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build frontend image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        load: true
        tags: hydro-frontend:scan
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy scanner on backend Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'hydro-backend:scan'
        format: 'sarif'
        output: 'trivy-docker-backend-results.sarif'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Run Trivy scanner on frontend Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'hydro-frontend:scan'
        format: 'sarif'
        output: 'trivy-docker-frontend-results.sarif'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Upload backend Docker scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-docker-backend-results.sarif'
        category: 'trivy-docker-backend'

    - name: Upload frontend Docker scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-docker-frontend-results.sarif'
        category: 'trivy-docker-frontend'
