name: CI/CD Pipeline

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

jobs:
  # Determine what changed to run only necessary jobs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.github/workflows/**'
            frontend:
              - 'frontend/**'
              - 'package*.json'
              - '.github/workflows/**'
            docker:
              - 'docker-compose.yaml'
              - '**/Dockerfile*'
              - '.github/workflows/**'

  # Get PR number for development builds
  pr-number:
    name: Get PR Number
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      number: ${{ steps.pr.outputs.number }}
    steps:
      - name: Get PR number
        id: pr
        run: echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT

  # Backend quality checks
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run backend linting
        run: make lint-backend

      - name: Run backend security scan
        run: make security-backend

  # Backend tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: hydro_habitat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup database schema
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/hydro_habitat_test?sslmode=disable
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
          # Create database schema
          PGPASSWORD=postgres psql -h localhost -U postgres -d hydro_habitat_test -c "
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            
            CREATE TABLE IF NOT EXISTS tanks (
              id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
              name VARCHAR(255) NOT NULL,
              volume_liters INTEGER NOT NULL CHECK (volume_liters > 0),
              water VARCHAR(50) NOT NULL,
              room VARCHAR(255),
              rack_location VARCHAR(255),
              inventory_number VARCHAR(255),
              notes TEXT,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
            );
            
            CREATE INDEX IF NOT EXISTS idx_tanks_water ON tanks(water);
            CREATE INDEX IF NOT EXISTS idx_tanks_created_at ON tanks(created_at);
          "

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/hydro_habitat_test?sslmode=disable
          CI: true
        run: make test-integration

  # Frontend quality checks
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Run frontend linting
        run: make lint-frontend

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test:run

  # Docker build and push
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-tests, frontend-quality]
    if: |
      always() && 
      (needs.backend-quality.result == 'success' || needs.backend-quality.result == 'skipped') &&
      (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped') &&
      (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build images
        run: |
          docker compose build --parallel
          echo "✅ Docker images built successfully"

      - name: Test image startup
        run: |
          docker compose up -d
          sleep 30
          
          # Test backend health
          curl -f http://localhost:8080/health || exit 1
          
          # Test frontend availability
          curl -f http://localhost:3000 || exit 1
          
          docker compose down
          echo "✅ Images tested successfully"

  # Semantic release and versioning
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && 
      contains(fromJson('["main", "dev", "develop"]'), github.ref_name)
    needs: [docker-build, pr-number]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/git \
            conventional-changelog-conventionalcommits

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Update project version files
  update-project:
    name: Update Project Versions
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: get_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
          echo "version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT

      - name: Update VERSION file
        run: |
          echo "${{ steps.get_tag.outputs.version }}" > VERSION
          git add VERSION

      - name: Update frontend package.json
        run: |
          cd frontend
          npm version ${{ steps.get_tag.outputs.version }} --no-git-tag-version
          git add package.json package-lock.json

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update version files to ${{ steps.get_tag.outputs.version }} [skip ci]" || exit 0
          git push origin ${{ github.ref_name }}
