name: Promote Branch

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source branch to promote from'
        required: true
        type: choice
        options:
          - develop
          - dev
      target_branch:
        description: 'Target branch to promote to'
        required: true
        type: choice
        options:
          - dev
          - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate promotion path
        run: |
          if [[ "${{ inputs.source_branch }}" == "develop" && "${{ inputs.target_branch }}" != "dev" ]]; then
            echo "Error: Can only promote develop to dev"
            exit 1
          fi
          if [[ "${{ inputs.source_branch }}" == "dev" && "${{ inputs.target_branch }}" != "main" ]]; then
            echo "Error: Can only promote dev to main"
            exit 1
          fi

  promote:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          source: ${{ inputs.source_branch }}
          destination: ${{ inputs.target_branch }}
          title: "chore: promote ${{ inputs.source_branch }} to ${{ inputs.target_branch }}"
          body: |
            ## Branch Promotion
            
            Promoting changes from `${{ inputs.source_branch }}` to `${{ inputs.target_branch }}`.
            
            ### Checklist
            - [ ] All tests passing
            - [ ] Security scans clean
            - [ ] Changelog updated
            - [ ] Version bump appropriate
            
            ### Type of promotion
            - [ ] Alpha → Beta (develop → dev)
            - [ ] Beta → Production (dev → main)
          labels: |
            promotion
            automated
          draft: false