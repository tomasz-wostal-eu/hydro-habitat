name: CI/CD Pipeline

on:
  push:
    branches: [ develop, dev, main ]
  pull_request:
    branches: [ develop, dev, main ]
    types: [ opened, synchronize, reopened ]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '20'
  DOCKER_BUILDKIT: 1

permissions:
  contents: write
  issues: write
  pull-requests: write
  security-events: write
  packages: write

jobs:
  # Store PR number for version tagging
  pr-number:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      number: ${{ steps.pr.outputs.number }}
    steps:
      - id: pr
        run: echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

  # Analyze file changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'frontend/**'
              - 'package*.json'
            docker:
              - 'docker-compose.yaml'
              - 'Dockerfile*'

  # Backend - Linting and Security
  backend-quality:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      
      - name: Install dependencies
        working-directory: ./backend
        run: go mod download
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: backend
          args: --timeout=5m
      
      - name: Run gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif ./backend/...'
      
      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
      
      - name: Run govulncheck
        working-directory: ./backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # Backend - Tests
  backend-tests:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hydro
          POSTGRES_PASSWORD: hydrosecret
          POSTGRES_DB: hydro_habitat_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum
      
      - name: Install dependencies
        working-directory: ./backend
        run: go mod download
      
      - name: Run unit tests
        working-directory: ./backend
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out
      
      - name: Run integration tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://hydro:hydrosecret@localhost:5432/hydro_habitat_test?sslmode=disable
        run: |
          go test -v -tags=integration ./...
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./backend/coverage.out
          flags: backend
          name: backend-coverage

  # Frontend - Linting and Tests
  frontend-quality:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint
      
      - name: Check Prettier formatting
        working-directory: ./frontend
        run: npm run format:check
      
      - name: Run tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
      
      - name: NPM Audit
        working-directory: ./frontend
        run: npm audit --production

  # Docker Build and Security Scan
  docker-build:
    needs: [backend-quality, backend-tests, frontend-quality]
    if: always() && (needs.backend-quality.result == 'success' || needs.backend-quality.result == 'skipped') && (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped') && (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker images
        run: |
          docker compose build --parallel
      
      - name: Run Trivy vulnerability scanner - Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hydro_habitat-backend:latest'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Run Trivy vulnerability scanner - Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'hydro_habitat-frontend:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: |
            trivy-backend.sarif
            trivy-frontend.sarif
      
      - name: Integration test with Docker Compose
        run: |
          docker compose up -d
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          curl -f http://localhost || exit 1
          docker compose down

  # Semantic Release with PR tracking
  release:
    needs: [docker-build, pr-number]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Get PR number from commit
        id: pr-info
        run: |
          # Try to get PR number from commit message or GitHub API
          PR_NUMBER=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          else
            # Try to extract from commit message
            COMMIT_MSG=$(git log -1 --pretty=%B)
            PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oP '(?<=#)\d+' | head -1)
            
            # If not found, try GitHub API
            if [[ -z "$PR_NUMBER" ]]; then
              PR_NUMBER=$(gh pr list --state merged --limit 1 --json number --jq '.[0].number' || echo "")
            fi
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install semantic-release and plugins
        run: |
          npm install -g semantic-release@latest
          npm install -g @semantic-release/git @semantic-release/github @semantic-release/changelog @semantic-release/exec
      
      - name: Create branch-specific release config
        run: |
          PR_SUFFIX=""
          if [[ -n "${{ steps.pr-info.outputs.pr_number }}" ]]; then
            PR_SUFFIX="+pr.${{ steps.pr-info.outputs.pr_number }}"
          fi
          
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            # Pre-prerelease (alpha) configuration
            cat > .releaserc.json << EOF
          {
            "branches": ["develop"],
            "tagFormat": "v\${version}",
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              ["@semantic-release/changelog", {
                "changelogFile": "CHANGELOG.md"
              }],
              ["@semantic-release/exec", {
                "prepareCmd": "echo \${nextRelease.version}${PR_SUFFIX} > VERSION"
              }],
              ["@semantic-release/git", {
                "assets": ["CHANGELOG.md", "VERSION"],
                "message": "chore(release): \${nextRelease.version}${PR_SUFFIX} [skip ci]\n\n\${nextRelease.notes}"
              }],
              ["@semantic-release/github", {
                "successComment": false,
                "prerelease": "alpha",
                "labels": ["alpha-release", "automated"]
              }]
            ]
          }
          EOF
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            # Prerelease (beta) configuration
            cat > .releaserc.json << EOF
          {
            "branches": ["dev"],
            "tagFormat": "v\${version}",
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              ["@semantic-release/changelog", {
                "changelogFile": "CHANGELOG.md"
              }],
              ["@semantic-release/exec", {
                "prepareCmd": "echo \${nextRelease.version}${PR_SUFFIX} > VERSION"
              }],
              ["@semantic-release/git", {
                "assets": ["CHANGELOG.md", "VERSION"],
                "message": "chore(release): \${nextRelease.version}${PR_SUFFIX} [skip ci]\n\n\${nextRelease.notes}"
              }],
              ["@semantic-release/github", {
                "successComment": "This PR is included in version \${nextRelease.version} :tada:",
                "prerelease": "beta",
                "labels": ["beta-release", "automated"]
              }]
            ]
          }
          EOF
          else
            # Production release configuration
            cat > .releaserc.json << EOF
          {
            "branches": ["main"],
            "tagFormat": "v\${version}",
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              ["@semantic-release/changelog", {
                "changelogFile": "CHANGELOG.md"
              }],
              ["@semantic-release/exec", {
                "prepareCmd": "echo \${nextRelease.version} > VERSION"
              }],
              ["@semantic-release/git", {
                "assets": ["CHANGELOG.md", "VERSION"],
                "message": "chore(release): \${nextRelease.version} [skip ci]\n\n\${nextRelease.notes}"
              }],
              ["@semantic-release/github", {
                "successComment": "This PR is included in version \${nextRelease.version} :tada:",
                "labels": ["release", "automated"]
              }]
            ]
          }
          EOF
          fi
      
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          npx semantic-release --dry-run=false

  # Update GitHub Project
  update-project:
    needs: [docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Update GitHub Project
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const projectNumber = 1; // Change to your project number
            let columnName = 'In Progress';
            
            // Determine column based on branch
            if (context.ref === 'refs/heads/main') {
              columnName = 'Done';
            } else if (context.ref === 'refs/heads/dev') {
              columnName = 'Testing';
            }
            
            // Get project
            const projects = await github.rest.projects.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            
            const project = projects.data.find(p => p.number === projectNumber);
            if (!project) {
              console.log('Project not found');
              return;
            }
            
            // Find column
            const columns = await github.rest.projects.listColumns({
              project_id: project.id
            });
            
            const column = columns.data.find(c => c.name === columnName);
            if (!column) {
              console.log('Column not found');
              return;
            }
            
            // Add build status note
            const branch = context.ref.replace('refs/heads/', '');
            await github.rest.projects.createCard({
              column_id: column.id,
              note: `Build #${context.runNumber} passed on ${branch} branch at ${new Date().toISOString()}`
            });
