name: PR Quality Checks

# This workflow handles quality checks for Pull Requests
# Direct push checks to main/develop are handled by branch-protection.yaml

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened, ready_for_review ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Pre-flight checks
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    outputs:
      backend-changed: ${{ steps.changes.outputs.backend }}
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      workflows-changed: ${{ steps.changes.outputs.workflows }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Detect changes
      uses: dorny/paths-filter@v3
      id: changes
      with:
        filters: |
          backend:
            - 'backend/**'
            - 'docker-compose.yaml'
            - 'Makefile'
          frontend:
            - 'frontend/**'
            - 'docker-compose.yaml'
            - 'package.json'
          workflows:
            - '.github/workflows/**'

  # Backend code quality checks
  backend-quality:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    needs: pre-flight
    if: needs.pre-flight.outputs.backend-changed == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-backend-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-backend-

    - name: Run backend linting
      run: |
        echo "🔍 Running Go linting checks..."
        docker compose run --rm backend-lint

    - name: Run backend security scanning
      run: |
        echo "🔒 Running security vulnerability scanning..."
        docker compose run --rm backend-security

    - name: Run backend unit tests
      run: |
        echo "🧪 Running unit tests..."
        docker compose run --rm backend-unit-test

    - name: Run backend integration tests
      run: |
        echo "🔗 Running integration tests..."
        # Export test results to a file for better debugging
        docker compose run -e CI=true -e GO_TEST_OUTPUT=/tmp/test-results.txt --rm backend-integration-test || {
          echo "❌ Integration tests failed! Test output:"
          docker compose run --rm backend cat /tmp/test-results.txt || true
          exit 1
        }

  # Frontend code quality checks
  frontend-quality:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    needs: pre-flight
    if: needs.pre-flight.outputs.frontend-changed == 'true'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-frontend-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-frontend-

    - name: Run frontend linting
      run: |
        echo "🔍 Running ESLint checks..."
        docker compose run --rm frontend-lint

    - name: Run frontend tests
      run: |
        echo "🧪 Running frontend tests..."
        docker compose run --rm frontend-test

  # Build verification
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: pre-flight
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and verify backend
      if: needs.pre-flight.outputs.backend-changed == 'true'
      run: |
        echo "🏗️ Building backend service..."
        docker compose build backend
        echo "✅ Backend build successful"

    - name: Build and verify frontend
      if: needs.pre-flight.outputs.frontend-changed == 'true'
      run: |
        echo "🏗️ Building frontend service..."
        docker compose build frontend
        echo "✅ Frontend build successful"

  # Integration test - full application
  integration-test:
    name: Full Application Integration Test
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, build-verification]
    if: always() && (needs.backend-quality.result == 'success' || needs.backend-quality.result == 'skipped') && (needs.frontend-quality.result == 'success' || needs.frontend-quality.result == 'skipped') && needs.build-verification.result == 'success'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set CI environment
      run: |
        echo "CI=true" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Start application stack
      run: |
        echo "🚀 Starting full application stack..."
        docker compose up -d --build
        
        echo "⏳ Waiting for PostgreSQL to be ready..."
        timeout=60
        while ! docker compose exec -T postgres pg_isready -U hydro -d hydro_habitat; do
          echo "Waiting for PostgreSQL..."
          sleep 2
          timeout=$((timeout - 2))
          if [ $timeout -le 0 ]; then
            echo "❌ PostgreSQL failed to start within 60 seconds"
            docker compose logs postgres
            exit 1
          fi
        done
        echo "✅ PostgreSQL is ready"
        
        echo "⏳ Waiting additional time for backend service startup..."
        sleep 15

    - name: Verify backend health
      run: |
        echo "🔍 Checking backend health endpoint..."
        max_attempts=12
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts - Testing backend health..."
          
          # Method 1: External check from host - use both localhost and 127.0.0.1
          echo "Trying external health check with localhost..."
          if curl -f -s --max-time 10 http://localhost:8080/health; then
            echo "✅ Backend health check passed (external with localhost)"
            curl -s http://localhost:8080/health | jq '.' || echo "Response received"
            break
          fi
          
          echo "Trying external health check with IP..."
          if curl -f -s --max-time 10 http://127.0.0.1:8080/health; then
            echo "✅ Backend health check passed (external with IP)"
            curl -s http://127.0.0.1:8080/health | jq '.' || echo "Response received"
            break
          fi
          
          # Method 2: Internal check from container using multiple approaches
          echo "Trying internal health check with localhost..."
          if docker compose exec -T backend wget -q -O- http://localhost:8080/health; then
            echo "✅ Backend health check passed (internal with localhost)"
            break
          fi
          
          echo "Trying internal health check with IP..."
          if docker compose exec -T backend wget -q -O- http://127.0.0.1:8080/health; then
            echo "✅ Backend health check passed (internal with IP)"
            break
          fi
          
          echo "Trying internal health check using curl..."
          if docker compose exec -T backend curl -f -s http://localhost:8080/health; then
            echo "✅ Backend health check passed (internal curl with localhost)"
            break
          fi
          
          echo "⏳ Attempt $attempt/$max_attempts failed, retrying in 10 seconds..."
          echo "Backend logs (last 10 lines):"
          docker compose logs --tail=10 backend
          sleep 10
          attempt=$((attempt + 1))
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Backend health check failed after $max_attempts attempts"
          echo "=== Backend Service Status ==="
          docker compose ps backend
          echo "=== Backend Logs ==="
          docker compose logs backend
          echo "=== PostgreSQL Logs ==="
          docker compose logs postgres
          echo "=== Network Connectivity Test ==="
          # Try both localhost and container IP
          echo "Testing with localhost..."
          docker compose exec -T backend wget -O- --no-verbose http://localhost:8080/health || echo "Internal localhost test failed"
          echo "Testing with 127.0.0.1..."
          docker compose exec -T backend wget -O- --no-verbose http://127.0.0.1:8080/health || echo "Internal IP test failed"
          exit 1
        fi

    - name: Verify frontend availability
      run: |
        echo "🔍 Checking frontend availability..."
        max_attempts=8
        attempt=1
        
        while [ $attempt -le $max_attempts ]; do
          echo "Attempt $attempt/$max_attempts - Testing frontend availability..."
          if curl -f -s --max-time 10 http://localhost; then
            echo "✅ Frontend availability check passed"
            break
          else
            echo "⏳ Attempt $attempt/$max_attempts failed, retrying in 5 seconds..."
            echo "Frontend logs (last 10 lines):"
            docker compose logs --tail=10 frontend
            sleep 5
            attempt=$((attempt + 1))
          fi
        done
        
        if [ $attempt -gt $max_attempts ]; then
          echo "❌ Frontend availability check failed after $max_attempts attempts"
          echo "=== Frontend Service Status ==="
          docker compose ps frontend
          echo "=== Frontend Logs ==="
          docker compose logs frontend
          exit 1
        fi

    - name: Run API integration tests
      run: |
        echo "🔗 Running API integration tests..."
        # Test basic API endpoints
        curl -f http://localhost:8080/api/v1/tanks || exit 1
        echo "✅ API integration tests passed"

    - name: Cleanup
      if: always()
      run: |
        echo "🧹 Cleaning up..."
        docker compose down --volumes --remove-orphans

  # Security and dependency checks
  security-checks:
    name: Security & Dependency Checks
    runs-on: ubuntu-latest
    needs: pre-flight
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  # Summary job
  pr-check-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, build-verification, integration-test, security-checks]
    if: always()
    
    steps:
    - name: Check all jobs status
      run: |
        echo "📊 PR Check Summary:"
        echo "==================="
        
        backend_status="${{ needs.backend-quality.result }}"
        frontend_status="${{ needs.frontend-quality.result }}"
        build_status="${{ needs.build-verification.result }}"
        integration_status="${{ needs.integration-test.result }}"
        security_status="${{ needs.security-checks.result }}"
        
        echo "🔧 Backend Quality: $backend_status"
        echo "🎨 Frontend Quality: $frontend_status"
        echo "🏗️ Build Verification: $build_status"
        echo "🔗 Integration Test: $integration_status"
        echo "🔒 Security Checks: $security_status"
        echo "==================="
        
        # Check if any critical job failed
        if [[ "$backend_status" == "failure" || "$frontend_status" == "failure" || "$build_status" == "failure" || "$integration_status" == "failure" || "$security_status" == "failure" ]]; then
          echo "❌ PR checks failed - please review the failing jobs above"
          exit 1
        else
          echo "✅ All PR checks passed successfully!"
        fi