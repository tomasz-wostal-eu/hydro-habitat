name: Dependency Security Updates

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  update-go-dependencies:
    name: Update Go Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: './backend/go.mod'

    - name: Check for security updates
      working-directory: ./backend
      run: |
        echo "Current Go dependencies:"
        go list -m all
        
        echo "Checking for vulnerabilities..."
        go install golang.org/x/vuln/cmd/govulncheck@latest
        govulncheck ./... || echo "Vulnerabilities found, creating report..."
        
        echo "Updating dependencies..."
        go mod tidy
        go get -u all
        go mod tidy

    - name: Run tests after updates
      working-directory: ./backend
      run: |
        go test ./... -v

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update Go dependencies for security'
        title: 'Security: Update Go Dependencies'
        body: |
          ## Security Dependency Updates
          
          This PR updates Go dependencies to address potential security vulnerabilities.
          
          ### Changes
          - Updated all Go modules to latest versions
          - Ran security vulnerability checks
          - Verified all tests pass
          
          ### Testing
          - [x] Unit tests pass
          - [x] Security scan completed
          
          Auto-generated by security update workflow.
        branch: security/update-go-deps
        delete-branch: true

  update-npm-dependencies:
    name: Update NPM Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: './frontend/.nvmrc'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Check for security updates
      working-directory: ./frontend
      run: |
        echo "Current NPM dependencies:"
        npm list --depth=0
        
        echo "Checking for security vulnerabilities..."
        npm audit --audit-level=moderate || echo "Vulnerabilities found"
        
        echo "Updating dependencies..."
        npm update
        npm audit fix --force || echo "Some vulnerabilities require manual intervention"

    - name: Run tests after updates
      working-directory: ./frontend
      run: |
        npm test -- --run

    - name: Create Pull Request
      uses: peter-evans/create-pull-request@v7
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore(deps): update NPM dependencies for security'
        title: 'Security: Update NPM Dependencies'
        body: |
          ## Security Dependency Updates
          
          This PR updates NPM dependencies to address potential security vulnerabilities.
          
          ### Changes
          - Updated all NPM packages to latest compatible versions
          - Ran security audit and auto-fixes
          - Verified all tests pass
          
          ### Testing
          - [x] Unit tests pass
          - [x] Security audit completed
          
          Auto-generated by security update workflow.
        branch: security/update-npm-deps
        delete-branch: true
